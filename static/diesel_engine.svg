<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a6a7a"/>
      <stop offset="50%" style="stop-color:#3d4a5c"/>
      <stop offset="100%" style="stop-color:#2a3540"/>
    </linearGradient>
    <linearGradient id="cylinderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a5a6d"/>
      <stop offset="50%" style="stop-color:#5a6b7e"/>
      <stop offset="100%" style="stop-color:#4a5a6d"/>
    </linearGradient>
    <linearGradient id="pistonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7a8a9a"/>
      <stop offset="100%" style="stop-color:#5a6a7a"/>
    </linearGradient>
    <linearGradient id="turboGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a7a8a"/>
      <stop offset="100%" style="stop-color:#4a5a6a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect fill="#1a2530" width="750" height="400" rx="10"/>

  <!-- Main Engine Block -->
  <rect x="100" y="80" width="520" height="220" fill="url(#metalGrad)" rx="8" stroke="#4a5a6d" stroke-width="2"/>

  <!-- Cylinder Head -->
  <rect x="110" y="55" width="500" height="35" fill="#4a5a6d" rx="5" stroke="#5a6b7e" stroke-width="1"/>

  <!-- Head bolts -->
  <g fill="#6a7b8e" stroke="#7a8b9e" stroke-width="1">
    <circle cx="130" cy="72" r="5"/>
    <circle cx="165" cy="72" r="5"/>
    <circle cx="215" cy="72" r="5"/>
    <circle cx="265" cy="72" r="5"/>
    <circle cx="315" cy="72" r="5"/>
    <circle cx="365" cy="72" r="5"/>
    <circle cx="415" cy="72" r="5"/>
    <circle cx="465" cy="72" r="5"/>
    <circle cx="515" cy="72" r="5"/>
    <circle cx="565" cy="72" r="5"/>
    <circle cx="595" cy="72" r="5"/>
  </g>

  <!-- Valve Cover -->
  <rect x="115" y="40" width="490" height="20" fill="#3d4a5c" rx="4"/>
  <g fill="#5a6b7e">
    <rect x="135" y="44" width="25" height="12" rx="2"/>
    <rect x="190" y="44" width="25" height="12" rx="2"/>
    <rect x="260" y="44" width="25" height="12" rx="2"/>
    <rect x="330" y="44" width="25" height="12" rx="2"/>
    <rect x="400" y="44" width="25" height="12" rx="2"/>
    <rect x="470" y="44" width="25" height="12" rx="2"/>
    <rect x="540" y="44" width="25" height="12" rx="2"/>
  </g>

  <!-- 6 Cylinders -->
  <g fill="url(#cylinderGrad)" stroke="#3a4a5a" stroke-width="1">
    <rect x="120" y="95" width="70" height="140" rx="4"/>
    <rect x="195" y="95" width="70" height="140" rx="4"/>
    <rect x="270" y="95" width="70" height="140" rx="4"/>
    <rect x="345" y="95" width="70" height="140" rx="4"/>
    <rect x="420" y="95" width="70" height="140" rx="4"/>
    <rect x="495" y="95" width="70" height="140" rx="4"/>
  </g>

  <!-- Cylinder liners (inner) -->
  <g fill="#2a3540" stroke="#3a4a5a" stroke-width="1">
    <rect x="130" y="100" width="50" height="130" rx="3"/>
    <rect x="205" y="100" width="50" height="130" rx="3"/>
    <rect x="280" y="100" width="50" height="130" rx="3"/>
    <rect x="355" y="100" width="50" height="130" rx="3"/>
    <rect x="430" y="100" width="50" height="130" rx="3"/>
    <rect x="505" y="100" width="50" height="130" rx="3"/>
  </g>

  <!-- 6 Pistons at different positions (firing order) -->
  <g fill="url(#pistonGrad)" stroke="#8a9aaa" stroke-width="1">
    <rect x="133" y="125" width="44" height="35" rx="3"/>
    <rect x="208" y="160" width="44" height="35" rx="3"/>
    <rect x="283" y="140" width="44" height="35" rx="3"/>
    <rect x="358" y="155" width="44" height="35" rx="3"/>
    <rect x="433" y="120" width="44" height="35" rx="3"/>
    <rect x="508" y="150" width="44" height="35" rx="3"/>
  </g>

  <!-- Piston rings -->
  <g stroke="#9aaabc" stroke-width="2" fill="none">
    <line x1="133" y1="133" x2="177" y2="133"/>
    <line x1="133" y1="140" x2="177" y2="140"/>
    <line x1="208" y1="168" x2="252" y2="168"/>
    <line x1="208" y1="175" x2="252" y2="175"/>
    <line x1="283" y1="148" x2="327" y2="148"/>
    <line x1="283" y1="155" x2="327" y2="155"/>
    <line x1="358" y1="163" x2="402" y2="163"/>
    <line x1="358" y1="170" x2="402" y2="170"/>
    <line x1="433" y1="128" x2="477" y2="128"/>
    <line x1="433" y1="135" x2="477" y2="135"/>
    <line x1="508" y1="158" x2="552" y2="158"/>
    <line x1="508" y1="165" x2="552" y2="165"/>
  </g>

  <!-- 6 Connecting Rods -->
  <g fill="#5a6a7a" stroke="#6a7a8a" stroke-width="1">
    <path d="M145 160 L150 250 L160 250 L165 160 Z"/>
    <path d="M220 195 L225 250 L235 250 L240 195 Z"/>
    <path d="M295 175 L300 250 L310 250 L315 175 Z"/>
    <path d="M370 190 L375 250 L385 250 L390 190 Z"/>
    <path d="M445 155 L450 250 L460 250 L465 155 Z"/>
    <path d="M520 185 L525 250 L535 250 L540 185 Z"/>
  </g>

  <!-- Crankshaft -->
  <ellipse cx="360" cy="270" rx="270" ry="20" fill="#4a5a6d" stroke="#5a6b7e" stroke-width="2"/>

  <!-- Crankshaft journals -->
  <g fill="#5a6b7e">
    <ellipse cx="155" cy="265" rx="12" ry="10"/>
    <ellipse cx="230" cy="265" rx="12" ry="10"/>
    <ellipse cx="305" cy="265" rx="12" ry="10"/>
    <ellipse cx="380" cy="265" rx="12" ry="10"/>
    <ellipse cx="455" cy="265" rx="12" ry="10"/>
    <ellipse cx="530" cy="265" rx="12" ry="10"/>
  </g>

  <!-- Oil Pan -->
  <path d="M 95 290 L 95 340 Q 95 360 115 360 L 605 360 Q 625 360 625 340 L 625 290 Z"
        fill="#2a3540" stroke="#3a4a5a" stroke-width="2"/>
  <rect x="330" y="365" width="60" height="15" fill="#3a4a5a" rx="3"/>

  <!-- Turbocharger -->
  <g transform="translate(30, 100)">
    <ellipse cx="40" cy="50" rx="45" ry="40" fill="url(#turboGrad)" stroke="#5a6b7e" stroke-width="2"/>
    <ellipse cx="40" cy="50" rx="30" ry="25" fill="#3d4a5c"/>
    <ellipse cx="40" cy="50" rx="15" ry="12" fill="#5a6b7e"/>
    <g stroke="#6a7a8a" stroke-width="1" fill="none">
      <path d="M25 50 Q40 35 55 50"/>
      <path d="M25 50 Q40 65 55 50"/>
      <path d="M40 35 Q55 50 40 65"/>
      <path d="M40 35 Q25 50 40 65"/>
    </g>
    <rect x="0" y="40" width="15" height="20" fill="#4a5a6d" rx="2"/>
    <rect x="70" y="42" width="25" height="16" fill="#4a5a6d" rx="2"/>
  </g>

  <!-- Exhaust Manifold (6 ports) -->
  <g fill="#4a3a3a" stroke="#5a4a4a" stroke-width="1">
    <path d="M120 90 Q100 90 95 110 L95 160 Q95 170 85 170 L60 170 L60 185 L90 185 Q105 185 105 170 L105 115 Q105 95 125 95 L125 90 Z"/>
    <path d="M195 90 Q175 100 170 115 L105 115 L105 130 L175 130 Q185 130 190 115 Q195 100 205 90 Z"/>
    <path d="M270 90 Q250 100 245 115 L170 115 L170 130 L250 130 Q260 130 265 115 Q270 100 280 90 Z"/>
    <path d="M345 90 Q325 100 320 115 L245 115 L245 130 L325 130 Q335 130 340 115 Q345 100 355 90 Z"/>
    <path d="M420 90 Q400 100 395 115 L320 115 L320 130 L400 130 Q410 130 415 115 Q420 100 430 90 Z"/>
    <path d="M495 90 Q475 100 470 115 L395 115 L395 130 L475 130 Q485 130 490 115 Q495 100 505 90 Z"/>
  </g>

  <!-- Flywheel -->
  <g transform="translate(650, 180)">
    <circle cx="0" cy="0" r="55" fill="#3d4a5c" stroke="#4a5a6d" stroke-width="3"/>
    <circle cx="0" cy="0" r="45" fill="#4a5a6d"/>
    <circle cx="0" cy="0" r="35" fill="#3d4a5c"/>
    <circle cx="0" cy="0" r="15" fill="#5a6b7e"/>
    <circle cx="0" cy="0" r="8" fill="#2a3540"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="#5a6b7e" stroke-width="4" stroke-dasharray="4,3"/>
    <g fill="#6a7a8a">
      <circle cx="0" cy="-25" r="4"/>
      <circle cx="22" cy="-12" r="4"/>
      <circle cx="22" cy="12" r="4"/>
      <circle cx="0" cy="25" r="4"/>
      <circle cx="-22" cy="12" r="4"/>
      <circle cx="-22" cy="-12" r="4"/>
    </g>
  </g>

  <!-- Starter Motor -->
  <g transform="translate(650, 280)">
    <rect x="-20" y="-15" width="50" height="30" fill="#3d4a5c" rx="5"/>
    <circle cx="-20" cy="0" r="12" fill="#4a5a6d"/>
    <rect x="25" y="-8" width="15" height="16" fill="#4a5a6d" rx="2"/>
  </g>

  <!-- 6 Fuel Injectors -->
  <g fill="#2a5a3a" stroke="#3a6a4a" stroke-width="1">
    <rect x="148" y="58" width="14" height="30" rx="2"/>
    <rect x="223" y="58" width="14" height="30" rx="2"/>
    <rect x="298" y="58" width="14" height="30" rx="2"/>
    <rect x="373" y="58" width="14" height="30" rx="2"/>
    <rect x="448" y="58" width="14" height="30" rx="2"/>
    <rect x="523" y="58" width="14" height="30" rx="2"/>
  </g>

  <!-- Fuel lines -->
  <path d="M155 58 L155 30 L530 30 L530 58" fill="none" stroke="#3a6a4a" stroke-width="3"/>
  <path d="M230 58 L230 30" fill="none" stroke="#3a6a4a" stroke-width="3"/>
  <path d="M305 58 L305 30" fill="none" stroke="#3a6a4a" stroke-width="3"/>
  <path d="M380 58 L380 30" fill="none" stroke="#3a6a4a" stroke-width="3"/>
  <path d="M455 58 L455 30" fill="none" stroke="#3a6a4a" stroke-width="3"/>
  <rect x="555" y="22" width="45" height="20" fill="#2a5a3a" rx="3"/>

  <!-- Alternator -->
  <g transform="translate(670, 100)">
    <rect x="-25" y="-20" width="50" height="40" fill="#4a5a6d" rx="5"/>
    <circle cx="0" cy="0" r="15" fill="#5a6b7e"/>
    <circle cx="0" cy="0" r="8" fill="#4a5a6d"/>
    <ellipse cx="-30" cy="0" rx="8" ry="12" fill="#3d4a5c" stroke="#4a5a6d" stroke-width="1"/>
  </g>

  <!-- Belt -->
  <path d="M640 100 Q620 140 640 180" fill="none" stroke="#2a2a2a" stroke-width="4"/>

  <!-- Coolant hoses -->
  <g fill="none" stroke="#4a7a9a" stroke-width="6" opacity="0.7">
    <path d="M95 140 Q70 140 70 170 L70 200"/>
    <path d="M590 95 Q620 95 630 75"/>
  </g>

  <!-- Oil filter -->
  <g transform="translate(670, 320)">
    <rect x="-15" y="-25" width="30" height="50" fill="#3a4a5a" rx="5"/>
    <ellipse cx="0" cy="-25" rx="12" ry="5" fill="#4a5a6d"/>
    <ellipse cx="0" cy="25" rx="12" ry="5" fill="#4a5a6d"/>
  </g>

  <!-- Label -->
  <text x="375" y="392" fill="#7a8a9a" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Marine Diesel Engine - 6 Cylinder Inline</text>
</svg>
